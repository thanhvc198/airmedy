name: CI

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libgtk-4-dev libwebkitgtk-6.0-dev build-essential pkg-config nasm

      - name: Install Wails v3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.95

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v2.5.0
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Create Dummy secrets.go
        run: |
          mkdir -p internal/app/config
          cat <<EOF > internal/app/config/secrets.go
          package config
          var (
            LastFmAPIKey    = "dummy"
            LastFmAPISecret = "dummy"
          )
          EOF

      - name: Cache FFmpeg (Linux)
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: internal/infra/audio/ffmpeg_libs
          key: ffmpeg-linux-${{ hashFiles('scripts/build-ffmpeg-linux.sh') }}

      - name: Build FFmpeg (Linux)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: bash scripts/build-ffmpeg-linux.sh

      - name: Cache Miniaudio (Linux)
        id: cache-miniaudio
        uses: actions/cache@v4
        with:
          path: internal/infra/audio/miniaudio
          key: miniaudio-linux-${{ hashFiles('scripts/fetch-miniaudio.sh') }}

      - name: Fetch miniaudio (Linux)
        if: steps.cache-miniaudio.outputs.cache-hit != 'true'
        run: bash scripts/fetch-miniaudio.sh

      - name: Frontend Install
        working-directory: frontend
        run: pnpm install

      - name: Generate Bindings
        run: wails3 task common:generate:bindings

      - name: Build Frontend
        working-directory: frontend
        run: pnpm build

      - name: Go Lint
        run: wails3 task lint:go

      - name: Go Test
        run: wails3 task test:go

      - name: Frontend Lint
        run: wails3 task lint:ui

      - name: Frontend Test
        run: wails3 task test:ui

      - name: Build Backend (Server Mode)
        run: wails3 task build:server
